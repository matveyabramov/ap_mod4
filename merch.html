<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин — Музей случайностей</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/pages/merch.css">
</head>
<body data-page="merch">
    <header class="header">
        <img src="./images/logo.jpg" alt="Логотип музея" class="header__logo">
        <div class="header__descr text text-gray">RND.MUSEUM <br> АРХИВ НЕПРЕДНАМЕРЕННОГО <br> DIGITAL COLLECTION / 2026</div>
        <nav class="header__nav" aria-label="Основная навигация">
            <a href="./about.html" class="header__nav-item button-text">О&nbsp;музее</a>
            <a href="./collection.html" class="header__nav-item button-text">Коллекция</a>
            <a href="./events.html" class="header__nav-item button-text">События</a>
            <a href="./merch.html" class="header__nav-item button-text" aria-current="page">Магазин</a>
        </nav>
        <button class="header__btn button arrow-up-right-decorator" type="button">Отправить находку</button>
        <button class="header__burger" type="button" aria-label="Открыть меню"
            aria-expanded="false" aria-controls="mobile-menu" hidden>
            <span></span>
            <span></span>
        </button>

    <main class="page page--merch">
        <h1 class="page__title h2">Магазин</h1>

    <div class="mobile-menu" id="mobile-menu" aria-hidden="true" hidden>
        <button class="mobile-menu__overlay" type="button" aria-label="Закрыть меню"></button>
        <aside class="mobile-menu__panel" role="dialog" aria-modal="true" aria-label="Навигация по сайту">
            <button class="mobile-menu__close" type="button" aria-label="Закрыть меню">
                <span></span>
                <span></span>
            </button>
            <nav class="mobile-menu__nav" aria-label="Мобильная навигация">
                <a href="./about.html" class="mobile-menu__link text">О музее</a>
                <a href="./collection.html" class="mobile-menu__link text">Коллекция</a>
                <a href="./events.html" class="mobile-menu__link text">События</a>
                <a href="./merch.html" class="mobile-menu__link text" aria-current="page">Магазин</a>
            </nav>
            <button class="mobile-menu__cta button arrow-up-right-decorator" type="button">Отправить находку</button>
        </aside>
    </div>

    <script src="./scripts/horizontal-scroll.js" defer></script>
    <script src="./scripts/mobile-menu.js" defer></script>
    <script src="./scripts/pages/merch.js" defer></script>
