<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 404</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="/ap_mod4/css/style.css">
</head>
<body>
    <section class="error">
        <main class="error-page">
            <div class="error__container container">
                <header class="header">
                    <a href="/ap_mod4/" class="header__logo-link" aria-label="На главную">
                        <img src="/ap_mod4/images/logo.jpg" alt="Логотип музея" class="header__logo">
                    </a>
                    <div class="header__descr text text-gray">RND.MUSEUM <br> АРХИВ НЕПРЕДНАМЕРЕННОГО <br> DIGITAL COLLECTION / 2026
                    </div>
                    <nav class="header__nav">
                        <a href="/ap_mod4/about/" class="header__nav-item button-text">О музее</a>
                        <a href="/ap_mod4/collection/" class="header__nav-item button-text">Коллекция</a>
                        <a href="/ap_mod4/events/" class="header__nav-item button-text">События</a>
                        <a href="/ap_mod4/merch/" class="header__nav-item button-text">Магазин</a>
                    </nav>
                    <button class="header__btn button arrow-up-right-decorator" type="button" data-submission-modal-open>Отправить
                        находку</button>
                    <button class="header__burger" type="button" aria-label="Открыть меню" aria-expanded="false"
                        aria-controls="mobile-menu" hidden>
                        <span></span>
                        <span></span>
                    </button>
                </header>
                <div class="error__wrapper">
                    <h1 class="error__heading h1">Ошибка 404</h1>
                    <div class="error__subtitle text">Такой страницы не существует</div>
                </div>
                <a href="/ap_mod4/" class="error__btn button arrow-up-right-decorator">
                    На главную
                </a>
                <div class="space__rand-guard rand-guard rand-guard-non-hero">
                    <img src="/ap_mod4/images/main/rand-guard.svg" alt="guardian of randomness" class="rand-guard__img">
                    <div class="rand-guard__descr text text-gray">Смотритель случайностей</div>
                </div>
            </div>
        </main>
    </section>

    <script src="/ap_mod4/scripts/mobile-menu.js" defer></script>
    <script src="/ap_mod4/scripts/submission-modal.js" defer></script>
</body>
</html>
